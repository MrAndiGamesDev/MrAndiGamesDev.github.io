<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/jpg" href="favicon.ico" sizes="16x16"/>
    <title>2048 Game For Offline</title>
    <p>Made By MrAndi</p>
    <iframe class="iframe" src="favicon.ico"></iframe>
    <div class="logo">
        <img src="logo.png" sizes="16x16">
    </div>
</head>
<body>
    <a href="https://www.youtube.com/@MrAndi_Games" target="_blank">MrAndi's YouTube</a>
    <a href="https://www.discord.gg/EzE5ae9UcN" target="_blank">MrAndi's Discord Server</a>
    <button onclick="reload()">Refresh The Page</button>
    <script src="refresh.js"></script>
    <div class="score-container">
        <div>Score: <span id="current-score">0</span></div>
        <div>High Score: <span id="high-score">0</span></div>
    </div>
    <div class="game-container">
        <div class="grid">
            <div class="cell" data-row="0" data-col="0"></div>
            <div class="cell" data-row="0" data-col="1"></div>
            <div class="cell" data-row="0" data-col="2"></div>
            <div class="cell" data-row="0" data-col="3"></div>
            <div class="cell" data-row="1" data-col="0"></div>
            <div class="cell" data-row="1" data-col="1"></div>
            <div class="cell" data-row="1" data-col="2"></div>
            <div class="cell" data-row="1" data-col="3"></div>
            <div class="cell" data-row="2" data-col="0"></div>
            <div class="cell" data-row="2" data-col="1"></div>
            <div class="cell" data-row="2" data-col="2"></div>
            <div class="cell" data-row="2" data-col="3"></div>
            <div class="cell" data-row="3" data-col="0"></div>
            <div class="cell" data-row="3" data-col="1"></div>
            <div class="cell" data-row="3" data-col="2"></div>
            <div class="cell" data-row="3" data-col="3"></div>
        </div>
    </div>
    <div id="game-over">
        Game Over!
        <button id="restart-btn">
         Restart Game
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
